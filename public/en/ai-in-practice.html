const CASES = [
  {
    id: "excel",
    tab: "Claude AI in Excel",
    icon: "chart",
    tag: "Business Automation",
    title: "Claude AI in Microsoft Excel — Data Analysis in Natural Language",
    desc: "Integrating Claude AI with Microsoft Excel eliminates the need for complex formulas and macros. Analysts and business specialists can now process data, build reports and generate insights using simple natural-language prompts.",
    features: [
      { icon: "clock", h: "60–80% time saved", p: "Cut analysis time from 45 minutes to 2 minutes. Automatic segmentation and reporting in seconds." },
      { icon: "target", h: "No formulas needed", p: "Data analysis without advanced Excel formulas. Anyone can be an analyst — just describe what you want to achieve." },
      { icon: "zap", h: "Versatile use cases", p: "Customer segmentation, marketing personalization, data cleanup, anomaly detection — with a single prompt." },
    ],
    results: ["Customer segmentation by revenue and region", "Generating personalized communication templates", "Validating and standardizing contact data", "Creating business reports without pivot tables", "Detecting duplicates and anomalies in databases"],

      <div style={{ borderRadius: "var(--radius-lg)", overflow: "hidden", border: "1px solid var(--border-strong)", background: "var(--bg-elev-2)" }}>

        </video>
      </div>
    ),
  },
  {
    id: "medgemma",
    tab: "MedGemma MRI",
    icon: "eye",
    tag: "Medicine & AI",
    title: "MRI Scan Analysis with MedGemma 1.5",
    desc: "Advanced medical image analysis system powered by MedGemma — a specialized AI model trained for medicine by Google DeepMind.",
    features: [
      { icon: "lock", h: "Full privacy", p: "The model runs fully locally — no data is sent to external servers. Your medical data stays safe." },
      { icon: "zap", h: "Instant analysis", p: "Fast MRI image interpretation using the latest advances in medical AI." },
      { icon: "target", h: "Specialist knowledge", p: "A model trained on medical data provides professional diagnostic support." },
    ],
    results: null,
    media: () => (
      <div style={{ borderRadius: "var(--radius-lg)", overflow: "hidden", border: "1px solid var(--border-strong)", position: "relative" }}>
        <img src="../medgemma-demo.png" alt="MRI image analysis with MedGemma" style={{ width: "100%", display: "block" }} loading="lazy" />

      </div>
    ),
  },
  {
    id: "ocr",
    tab: "OCR — Text from Image",
    icon: "file",
    tag: "Text Recognition",
    title: "OCR — How to turn an image into editable text?",
    desc: 'OCR (Optical Character Recognition) "reads" text from photos, scans or PDF documents and converts it into a format you can copy and edit. Like a digital assistant transcribing notes from a photo of a whiteboard — instantly and without typos.',

      { icon: "cpu", h: "DeepSeek-VL2 / DeepSeek OCR", p: "A modern multimodal model with excellent performance-to-resource ratio. Combines image understanding with text recognition." },
      { icon: "book", h: "Tesseract OCR", p: "The OCR classic developed by Google — the most popular open-source engine. Supports over 100 languages." },

          <span>🔍</span>
          <span style={{ color: "var(--accent)", fontSize: "1.5rem" }}>→</span>

    tag: "Mobile Apps",

        </div>
        <div style={{ borderRadius: "var(--radius-lg)", overflow: "hidden", border: "1px solid var(--border-strong)", position: "relative" }}>
          <img src="../kod_mobileapp.png" alt="Mobile app source code generated by AI" style={{ width: "100%", display: "block" }} loading="lazy" />
          <span className="chip" style={{ position: "absolute", top: 12, right: 12 }}>AI code</span>
        </div>
      </div>
    ),
  },

    id: "evo2",
    tab: "Evo 2 — Genetics",
    icon: "target",
    tag: "Genomics & AI",
    title: "Predicting Genetic Mutations with Evo 2",
    desc: "Evo 2 is a breakthrough, fully open-source AI model trained on 9 trillion DNA base pairs from across all domains of life. It can predict the effects of genetic mutations without additional training.",
    features: [
      { icon: "target", h: "Precise variant analysis", p: "Zero-shot assessment of the pathogenicity of genetic mutations (e.g. BRCA1, clinical variants from the ClinVar database)." },
      { icon: "zap", h: "Genome-scale analysis", p: "Processes DNA sequences up to 1 million base pairs long, enabling the study of entire genes together with their regulatory environment." },
      { icon: "cpu", h: "Designing new sequences", p: "Beyond prediction, Evo 2 generates new DNA sequences — from mitochondrial genomes to eukaryotic chromosomes." },
    ],
    results: ["Predicting pathogenicity of clinical variants in oncology", "Analyzing the impact of mutations in non-coding DNA regions", "Supporting gene therapy design", "Automatic annotation of functional genome elements", "Identifying potentially harmful mutations in screening studies"],
    media: () => (
      <div className="card" style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16, padding: 40 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 20, fontSize: "3rem" }}>

          <span style={{ color: "var(--accent)", fontSize: "1.5rem" }}>→</span>
          <span>🤖</span>
          <span style={{ color: "var(--accent)", fontSize: "1.5rem" }}>→</span>
          <span>🔬</span>

          </p>
        </div>
      </section>

      <section className="section">
        <div className="container">
          {/* Tab navigation */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 48, borderBottom: "1px solid var(--border)", paddingBottom: 0 }}>
            {CASES.map((c, i) => (
              <button key={i} onClick={() => setActive(i)} style={{
                background: "transparent", border: "none", cursor: "pointer",
                padding: "12px 20px", fontFamily: "inherit", fontSize: "0.9rem",
                fontWeight: active === i ? 600 : 400,
                color: active === i ? "var(--fg)" : "var(--fg-muted)",
                borderBottom: active === i ? "2px solid var(--accent)" : "2px solid transparent",
                marginBottom: -1, transition: "color 0.15s",
                display: "flex", alignItems: "center", gap: 8,
              }}>
                <Icon name={c.icon} size={15} />
                {c.tab}
              </button>
            ))}
          </div>

          {/* Content */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 56, alignItems: "start" }}>
            {/* Media */}
            <div>
              {c.media()}
            </div>

            {/* Text */}
            <div>
              <span className="chip" style={{ marginBottom: 16 }}>{c.tag}</span>
              <h2 style={{ marginBottom: 16, fontSize: "1.5rem" }}>{c.title}</h2>
              <p className="text-muted" style={{ marginBottom: 32, lineHeight: 1.8 }}>{c.desc}</p>

              <div style={{ display: "flex", flexDirection: "column", gap: 20, marginBottom: 32 }}>
                {c.features.map((f, i) => (
                  <div key={i} style={{ display: "flex", gap: 16 }}>
                    <div style={{ color: "var(--accent)", marginTop: 2, flexShrink: 0 }}><Icon name={f.icon} size={18} /></div>
                    <div>
                      <div style={{ fontWeight: 500, marginBottom: 4 }}>{f.h}</div>
                      <p className="text-muted" style={{ margin: 0, fontSize: "0.9rem" }}>{f.p}</p>
                    </div>
                  </div>
                ))}
              </div>

              {c.results && (
                <div style={{ marginBottom: 32 }}>
                  <div style={{ fontSize: "0.85rem", fontWeight: 600, marginBottom: 12, color: "var(--fg-muted)", textTransform: "uppercase", letterSpacing: "0.05em" }}>Use cases</div>
                  <ul style={{ listStyle: "none", padding: 0, margin: 0, display: "flex", flexDirection: "column", gap: 8 }}>
                    {c.results.map((r, i) => (
                      <li key={i} style={{ display: "flex", gap: 10, fontSize: "0.9rem", alignItems: "flex-start" }}>
                        <span style={{ color: "var(--accent)", marginTop: 3, flexShrink: 0 }}><Icon name="check" size={14} /></span>
                        <span className="text-muted">{r}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              )}

              <a href="index.html#contact" className="btn btn-primary">Book a free consultation<Icon name="arrow" size={16} /></a>
            </div>
          </div>
        </div>
      </section>

      <Footer />
      <CookieBanner />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<PracticeApp />);
</script>
